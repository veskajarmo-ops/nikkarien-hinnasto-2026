<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hinnasto 2026 – Nikkarien Oy v0.3</title>

<!-- ===== PWA ===== -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7B3D1E">
<meta name="application-name" content="Nikkarien Hinnasto">
<meta name="description" content="Nikkarien Oy:n hinnasto 2026 — toimii offline-tilassa.">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nikkarien">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- Ikonit -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<script>
// Automaattinen versiointi: pohja v0.2 = 2026-04-10, kasvaa +0.1 per päivä
(function(){
  var BASE_DATE = new Date('2026-04-10');
  BASE_DATE.setHours(0,0,0,0);
  var today = new Date();
  today.setHours(0,0,0,0);
  var daysDiff = Math.max(0, Math.floor((today - BASE_DATE) / 86400000));
  var tenths = 2 + daysDiff; // v0.2 = 2 kymmenystä
  window.AUTO_VERSION = 'v' + (tenths / 10).toFixed(1);
  window.AUTO_DATE = today.toLocaleDateString('fi-FI', {day:'numeric', month:'numeric', year:'numeric'});
})();
</script>
<style>
/* ===== BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--card:#fff;--border:#e5e0da;
  --accent:#7B3D1E;--text:#1a1410;--muted:#8a7f78;
  --erikois:#b45309;--erikois-bg:#fffbeb;--erikois-border:#fde68a;
  --shadow:0 1px 6px rgba(0,0,0,0.07),0 2px 12px rgba(0,0,0,0.04);
  --cart-bar:56px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:calc(var(--cart-bar)+20px);}

/* ===== HEADER ===== */
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:12px 14px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(123,61,30,0.10);}
.header-top{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.logo{font-size:17px;font-weight:800;color:var(--accent);}
.sub{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-left:auto;}
.search-wrap{position:relative;margin-bottom:8px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#searchInput{width:100%;padding:10px 40px 10px 36px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;outline:none;transition:border-color .2s;}
#searchInput:focus{border-color:var(--accent);}
#searchInput::placeholder{color:var(--muted);}
.clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;display:none;line-height:1;}
.clear-btn.show{display:block;}
.chips{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);transition:all .15s;white-space:nowrap;}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip.erikois-chip{border-color:var(--erikois);color:var(--erikois);background:var(--erikois-bg);border-width:2px;font-weight:800;letter-spacing:.3px;box-shadow:0 1px 4px rgba(180,83,9,0.18);}
.chip.erikois-chip.active{background:var(--erikois);border-color:var(--erikois);color:#fff;box-shadow:0 2px 8px rgba(180,83,9,0.35);}


/* ===== LANGUAGE ===== */
.lang-bar{background:#fff;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:8px 14px;gap:8px;}
.lang-bar-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;}
.lang-bar-right{display:flex;align-items:center;gap:8px;}
.lang-btn{background:#f0ece8;border:2px solid #c9bfb6;color:#5a4a42;border-radius:8px;padding:7px 16px;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;min-width:72px;justify-content:center;}
.lang-btn.active{background:var(--brown);border-color:var(--brown);color:#fff;box-shadow:0 2px 8px rgba(123,61,30,0.35);}
.lang-btn:not(.active):hover{background:#e0d8d0;color:var(--text);}
.help-overlay{display:none;position:fixed;inset:0;background:rgba(15,8,4,0.75);z-index:400;align-items:flex-start;justify-content:center;padding:16px 0 0;}
.help-overlay.open{display:flex;}
.help-modal{background:#faf9f7;width:100%;max-width:680px;height:calc(100dvh - 16px);border-radius:16px 16px 0 0;display:flex;flex-direction:column;overflow:hidden;}
.help-header{background:var(--brown);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.help-title{font-size:16px;font-weight:800;flex:1;}
.help-close{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.help-body{flex:1;overflow-y:auto;padding:0;}
.help-hero{background:var(--brown);color:#fff;padding:28px 20px 24px;text-align:center;}
.help-hero-icon{font-size:36px;margin-bottom:10px;}
.help-hero-title{font-size:20px;font-weight:800;margin-bottom:6px;}
.help-hero-sub{font-size:13px;opacity:.8;}
.help-section{padding:16px 18px 4px;}
.help-sec-title{font-size:13px;font-weight:800;color:var(--brown);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--border);}
.help-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.help-step-num{width:26px;height:26px;border-radius:50%;background:#f5ede6;color:var(--brown);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.help-step-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.help-step-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.help-tip{background:#fffbeb;border-left:3px solid #b45309;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#78350f;line-height:1.5;}
.help-tip strong{display:block;margin-bottom:2px;}
.help-tags{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px;}
.help-footer{text-align:center;padding:16px 20px 28px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);}
.help-open-btn{background:var(--brown);border:none;color:#fff;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.help-open-btn:hover{background:#9a4d25;}

/* ===== STATS ===== */
.stats{font-size:11px;color:var(--muted);padding:7px 14px 2px;}

/* ===== GRID ===== */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:9px 9px 12px;}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1040px){.grid{grid-template-columns:repeat(5,1fr);}}

/* ===== CARD ===== */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .12s,border-color .15s;position:relative;}
.card:active{transform:scale(0.97);}
.card.in-cart{border-color:var(--accent);box-shadow:0 0 0 2px rgba(123,61,30,0.20);}
.card.erikois-card{border-color:var(--erikois-border);background:var(--erikois-bg);}
.card.erikois-card.in-cart{border-color:var(--erikois);box-shadow:0 0 0 2px rgba(180,83,9,0.25);}
.card-img{width:100%;aspect-ratio:1;object-fit:contain;background:#f6f1eb;padding:8px;}
.erikois-card .card-img{background:#fef9ee;}
.card-no-img{width:100%;aspect-ratio:1;background:#f0ece5;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:28px;}
.card-body{padding:7px 9px 9px;flex:1;display:flex;flex-direction:column;gap:2px;}
.card-nro{font-size:9.5px;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase;}
.erikois-card .card-nro{color:var(--erikois);}
.card-name{font-size:11px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;}
.card-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;margin-top:3px;width:fit-content;}
.card-footer{padding-top:5px;display:flex;align-items:flex-end;justify-content:space-between;}
.price{font-size:14px;font-weight:800;color:var(--accent);}
.erikois-card .price{color:var(--erikois);}
.price-norm{font-size:10px;color:var(--muted);text-decoration:line-through;}
.moq{font-size:9.5px;color:var(--muted);}
.saldo-badge{font-size:9px;color:#16a34a;font-weight:600;}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;transition:background .15s;white-space:nowrap;}
.erikois-card .add-btn{background:var(--erikois);}
.add-btn:active{opacity:.8;}
.in-cart-badge{position:absolute;top:7px;right:7px;background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.erikois-card .in-cart-badge{background:var(--erikois);}
.erikois-ribbon{position:absolute;top:8px;left:0;background:var(--erikois);color:#fff;font-size:8px;font-weight:800;padding:2px 8px 2px 6px;border-radius:0 4px 4px 0;letter-spacing:.5px;}
.savings-pct{display:inline-block;background:#fef3c7;color:#92400e;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;}

/* Tag colors */
.tag-kauha{background:#fef3e8;color:#c25c10;}
.tag-kiulu{background:#e8f0fe;color:#1a56a8;}
.tag-setti{background:#f0fdf4;color:#16a34a;}
.tag-mittari{background:#fdf4ff;color:#9333ea;}
.tag-tuoksu{background:#fff7ed;color:#d97706;}
.tag-muu{background:#f1f5f9;color:#475569;}
.tag-tekstiili{background:#fef2f2;color:#dc2626;}
.tag-harja{background:#f0fdf4;color:#15803d;}
.tag-takka{background:#1c1917;color:#d4a26a;}
.tag-erikoiserä{background:#fef3c7;color:#92400e;}

/* ===== CART BAR ===== */
.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--accent);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;box-shadow:0 -3px 16px rgba(123,61,30,0.25);min-height:var(--cart-bar);}
.cart-bar.hidden{display:none;}
.cart-bar-icon{font-size:22px;flex-shrink:0;}
.cart-bar-txt{flex:1;}
.cart-bar-label{font-size:13px;font-weight:700;}
.cart-bar-sub{font-size:11px;opacity:.85;}
.cart-bar-arrow{font-size:18px;opacity:.9;}

/* ===== PRODUCT MODAL ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,8,4,0.72);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:22px 22px 0 0;border-top:3px solid var(--accent);width:100%;max-width:520px;max-height:94vh;overflow-y:auto;animation:slideUp .2s ease;}
.modal.erikois-modal{border-top-color:var(--erikois);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-img-wrap{background:#f6f1eb;display:flex;align-items:center;justify-content:center;padding:18px;margin-top:8px;}
.modal-img{max-width:100%;max-height:220px;object-fit:contain;}
.modal-body{padding:14px 18px 36px;}
.modal-nro{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:3px;}
.modal-name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:14px;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.dlbl{font-size:12px;color:var(--muted);}
.dval{font-size:13px;font-weight:700;}
.dval.accent{color:var(--accent);font-size:21px;}
.dval.erikois-accent{color:var(--erikois);font-size:21px;}
.modal-add-section{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.qty-row{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:10px 14px;}
.qty-label{font-size:13px;color:var(--muted);flex:1;}
.qty-ctrl{display:flex;align-items:center;}
.qty-btn{background:var(--accent);color:#fff;border:none;width:34px;height:34px;font-size:18px;font-weight:700;cursor:pointer;transition:opacity .12s;}
.qty-btn:first-child{border-radius:8px 0 0 8px;}
.qty-btn:last-child{border-radius:0 8px 8px 0;}
.qty-btn:active{opacity:.7;}
.qty-val{background:#fff;border:1.5px solid var(--border);border-left:none;border-right:none;width:48px;height:34px;text-align:center;font-size:15px;font-weight:700;color:var(--text);}
.modal-add-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:background .15s;}
.modal-add-btn.erikois{background:var(--erikois);}
.modal-add-btn.remove{background:#dc2626;}
.modal-add-btn:active{opacity:.8;}
.close-btn{position:absolute;top:12px;right:14px;background:var(--bg);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mhead{position:relative;}
.no-results{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;font-size:14px;}

/* ===== CART MODAL ===== */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(15,8,4,0.72);z-index:300;align-items:flex-start;justify-content:center;}
.cart-overlay.open{display:flex;}
.cart-modal{background:var(--surface);width:100%;max-width:600px;height:100dvh;display:flex;flex-direction:column;animation:slideLeft .2s ease;}
@keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cart-header{background:var(--accent);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.cart-title{font-size:17px;font-weight:800;flex:1;}
.cart-close{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cart-list{flex:1;overflow-y:auto;padding:6px 14px;}
.cart-section-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 0 4px;border-top:1px solid var(--border);margin-top:6px;}
.cart-section-title:first-child{border-top:none;margin-top:0;}
.cart-empty{text-align:center;padding:60px 20px;color:var(--muted);}
.cart-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.cart-item-img{width:50px;height:50px;object-fit:contain;background:#f6f1eb;border-radius:8px;padding:3px;flex-shrink:0;}
.cart-item-erikois{background:#fef9ee;}
.cart-item-no-img{width:50px;height:50px;background:#f0ece5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cart-item-info{flex:1;min-width:0;}
.cart-item-nro{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;}
.cart-item-nro.erikois{color:var(--erikois);}
.cart-item-name{font-size:11px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item-meta{font-size:10px;color:var(--muted);}
.cart-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.cart-item-price{font-size:13px;font-weight:800;color:var(--accent);}
.cart-item-ctrl{display:flex;align-items:center;}
.cart-item-btn{background:var(--accent);color:#fff;border:none;width:28px;height:28px;font-size:15px;font-weight:700;cursor:pointer;}
.cart-item-btn:first-child{border-radius:6px 0 0 6px;}
.cart-item-btn:last-child{border-radius:0 6px 6px 0;}
.cart-item-btn:active{opacity:.7;}
.cart-item-qty{background:#fff;border:1.5px solid var(--border);border-left:none;border-right:none;width:36px;height:28px;text-align:center;font-size:13px;font-weight:700;}
.cart-item-del{background:none;border:none;color:#dc2626;font-size:18px;cursor:pointer;padding:0 4px;}
.cart-footer{background:var(--surface);border-top:2px solid var(--border);padding:12px 18px;flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
.cart-totals{margin-bottom:12px;}
.total-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;}
.total-row.section{font-size:11px;color:var(--muted);padding-top:6px;}
.total-row.big{font-size:16px;font-weight:800;color:var(--accent);border-top:1.5px solid var(--border);margin-top:4px;padding-top:8px;}
.print-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
.print-btn:active{opacity:.8;}

.customer-field{margin-bottom:10px;padding:10px 12px;background:var(--bg);border-radius:10px;border:1.5px solid var(--border);}
.customer-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.customer-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.customer-input:focus{border-color:var(--accent);}
.customer-input::placeholder{color:#bbb;}

/* ===== PRINT ===== */
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{background:#fff;padding:0;}
  header,#statsBar,.cart-bar,.overlay,.cart-overlay,.grid{display:none!important;}
  .print-doc{display:block!important;}
}
.print-doc{display:none;padding:16mm 15mm;}
.pd-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7mm;padding-bottom:4mm;border-bottom:2pt solid #7B3D1E;}
.pd-logo{font-size:20pt;font-weight:800;color:#7B3D1E;}
.pd-company-info{font-size:7.5pt;color:#666;line-height:1.6;}
.pd-meta{text-align:right;font-size:8pt;color:#555;line-height:1.7;}
.pd-title{font-size:17pt;font-weight:800;color:#1a1410;margin-bottom:1mm;}
.pd-subtitle{font-size:8.5pt;color:#666;margin-bottom:5mm;}
.pd-section{font-size:8pt;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7B3D1E;margin:5mm 0 2mm;border-bottom:.5pt solid #e5e0da;padding-bottom:1.5mm;}
.pd-section.erikois{color:#b45309;}
.pd-table{width:100%;border-collapse:collapse;}
.pd-table thead tr{background:#7B3D1E;color:#fff;}
.pd-table.erikois-table thead tr{background:#b45309;}
.pd-table th{padding:3.5pt 5pt;font-size:7.5pt;font-weight:700;text-align:left;}
.pd-table th.right{text-align:right;}
.pd-table tbody tr{border-bottom:.4pt solid #e5e0da;}
.pd-table tbody tr:nth-child(even){background:#faf9f7;}
.pd-table.erikois-table tbody tr:nth-child(even){background:#fffdf5;}
.pd-table td{padding:3pt 5pt;font-size:7.5pt;vertical-align:middle;}
.pd-table td.right{text-align:right;font-weight:700;}
.pd-img{width:34pt;height:34pt;object-fit:contain;border-radius:3pt;}
.pd-img-cell{width:40pt;text-align:center;}
.pd-nro{font-size:6.5pt;color:#7B3D1E;font-weight:700;text-transform:uppercase;}
.erikois-table .pd-nro{color:#b45309;}
.pd-name{font-size:7.5pt;line-height:1.3;}
.pd-totals-wrap{margin-top:6mm;display:flex;justify-content:flex-end;}
.pd-totals{width:230pt;border-collapse:collapse;}

"ryhma":"Muu","kuva":"images/img-186-0b3f54fd.jpg"},{"nro":"815","nimi":"KÄSINTEHTY LAVENTELISAIPPUA 100G","hinta":4.9,"hinta_norm":null,"moq":12,"saldo":null,"ryhma":"Muu","kuva":"images/img-187-09d053c7.jpg"},{"nro":"845ST","nimi":"SAUNIA RIPUSTUSTELINE AROMIMALJOILLE. KÄÄNTYY SIVULLE. PITUUS 32,5 CM","hinta":11.9,"hinta_norm":null,"moq":4,"saldo":null,"ryhma":"Muu","kuva":"images/img-188-6db56fda.jpg"},{"nro":"868","nimi":"SAUNIA LAUTEISIIN UPOTETTAVA KIULU 9L, RUOSTUMATON TERÄS","hinta":24.9,"hinta_norm":null,"moq":3,"saldo":null,"ryhma":"Kiulu","kuva":"images/img-189-5cc45ed0.jpg"}];
const VAT=0.255;

const tagClass={
  'Kauha':'tag-kauha','Kiulu':'tag-kiulu','Setti':'tag-setti','Mittari':'tag-mittari',
  'Tuoksu':'tag-tuoksu','Muu':'tag-muu','Tekstiili':'tag-tekstiili','Harja':'tag-harja',
  'Takka':'tag-takka','Erikoiserä':'tag-erikoiserä'
};
const allGroups=['Kauha','Kiulu','Setti','Mittari','Tuoksu','Tekstiili','Harja','Takka','Muu','Erikoiserä'];

let activeGroup=null, searchQ='';
let cart={};  // cart_key -> qty

// ── Chips ──
const chipsEl=document.getElementById('chips');
function addChip(label,g,isErikois){
  const c=document.createElement('div');
  c.className='chip'+(g===null?' active':'')+(isErikois?' erikois-chip':'');
  c.textContent=label;
  c.onclick=()=>{activeGroup=g;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');render();};
  chipsEl.appendChild(c);
}
addChip('Kaikki ('+P.length+')',null,false);
allGroups.forEach(g=>{
  const n=P.filter(p=>p.ryhma===g).length;
  if(!n)return;
  addChip(g+' ('+n+')',g,g==='Erikoiserä');
});

// ── Helpers ──
function fmt(n,d=2){if(n==null)return'—';return n.toLocaleString('fi-FI',{minimumFractionDigits:d,maximumFractionDigits:d});}
function filtered(){
  return P.filter(p=>{
    const gm=!activeGroup||p.ryhma===activeGroup;
    const q=searchQ.toLowerCase();
    const sm=!q||String(p.nro).toLowerCase().includes(q)||p.nimi.toLowerCase().includes(q);
    return gm&&sm;
  });
}
function cartCount(){return Object.values(cart).filter(v=>v>0).length;}
function cartItems(){return P.filter(p=>cart[p.cart_key]>0);}
function cartTotal(items){return (items||cartItems()).reduce((a,p)=>a+p.hinta*(cart[p.cart_key]||0),0);}

// ── Render grid ──
function render(){
  const list=filtered();
  const g=document.getElementById('grid');
  const s=document.getElementById('statsBar');
  if(!list.length){g.innerHTML='<div class="no-results">'+t().noResults+'</div>';s.textContent='';return;}
  s.textContent=t().stats(list.length);
  g.innerHTML=list.map(p=>{
    const gi=P.indexOf(p);
    const isE=p.source==='erikois';
    const inCart=cart[p.cart_key]>0;
    const img=p.kuva?`<img class="card-img" src="${p.kuva}" alt="" loading="lazy">`:'<div class="card-no-img">📦</div>';
    const pn=pName(p);
    const tc=tagClass[p.ryhma]||'tag-muu';
    const badge=inCart?`<div class="in-cart-badge">${cart[p.cart_key]}</div>`:'';
    const ribbon=isE?'<div class="erikois-ribbon">⚡ ERIKOISERÄ</div>':'';
    const normLine=isE&&p.hinta_norm?`<div class="price-norm">${fmt(p.hinta_norm)} €</div>`:'';
    const savPct=isE&&p.hinta_norm?Math.round((1-p.hinta/p.hinta_norm)*100):0;
    const savBadge=savPct>0?`<span class="savings-pct">${t().salePct(savPct)}</span>`:'';
    const saldoLine=isE&&p.saldo!=null?`<div class="saldo-badge">${t().saldoLbl(p.saldo)}</div>`:'';
    return`<div class="card${inCart?' in-cart':''}${isE?' erikois-card':''}" onclick="openModal(${gi})">
      ${ribbon}${badge}${img}
      <div class="card-body">
        <div class="card-nro">${p.nro}</div>
        <div class="card-name">${pn}</div>
        <span class="card-tag ${tc}">${p.ryhma}</span>
        <div class="card-footer">
          <div>
            ${normLine}
            <div class="price">${fmt(p.hinta)} €${savBadge}</div>
            <div class="moq">MOQ ${p.moq} kpl</div>
            ${saldoLine}
          </div>
          <button class="add-btn" onclick="quickAdd(event,'${p.cart_key}','${p.nro}')">
            ${inCart?t().inCartBtn(cart[p.cart_key]):t().addBtn}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Quick add ──
function quickAdd(e,ck,nro){
  e.stopPropagation();
  const p=P.find(x=>x.cart_key===ck);
  if(!p)return;
  cart[ck]=(cart[ck]||0)+p.moq;
  updateCartBar();render();
}

// ── Cart bar ──
function updateCartBar(){
  const n=cartCount();
  const bar=document.getElementById('cartBar');
  if(!n){bar.classList.add('hidden');return;}
  bar.classList.remove('hidden');
  document.getElementById('cartBarLabel').textContent=t().cartBarLabel(n);
  document.getElementById('cartBarSub').textContent=t().cartBarSub(cartTotal());
}

// ── Product modal ──
function openModal(gi){
  const p=P[gi];if(!p)return;
  const isE=p.source==='erikois';
  const pn=pName(p);
  const inCart=cart[p.cart_key]>0;
  const modal=document.getElementById('productModal');
  modal.className='modal'+(isE?' erikois-modal':'');
  document.getElementById('mImg').innerHTML=p.kuva
    ?`<div class="modal-img-wrap"><img class="modal-img" src="${p.kuva}" alt=""></div>`:'';
  const tc=tagClass[p.ryhma]||'tag-muu';
  const tr=t();
  const savPct=isE&&p.hinta_norm?Math.round((1-p.hinta/p.hinta_norm)*100):0;
  const accentClass=isE?'erikois-accent':'accent';
  document.getElementById('mBody').innerHTML=`
    <div class="modal-nro">Tuotenro ${p.nro}${isE?' · ⚡ '+(LANG==='fi'?'Erikoiserä':'Special Offer'):''}</div>
    <div class="modal-name">${pn}</div>
    <span class="card-tag ${tc}" style="margin-bottom:12px;display:inline-block">${p.ryhma}</span>
    ${isE&&p.hinta_norm?`<div class="drow"><span class="dlbl">${tr.modalNormLbl}</span><span class="dval" style="text-decoration:line-through;color:var(--muted)">${fmt(p.hinta_norm)} €</span></div>`:''}
    <div class="drow"><span class="dlbl">${tr.modalPriceLbl}</span><span class="dval ${accentClass}">${fmt(p.hinta)} €${savPct?` <span class="savings-pct">-${savPct}%</span>`:''}</span></div>
    <div class="drow"><span class="dlbl">${tr.modalVatLbl}</span><span class="dval">${fmt(p.hinta*(1+VAT))} €</span></div>
    <div class="drow"><span class="dlbl">${tr.modalMoqLbl}</span><span class="dval" style="color:#16a34a">${p.moq} kpl</span></div>
    ${isE&&p.saldo!=null?`<div class="drow"><span class="dlbl">${tr.modalSaldoLbl}</span><span class="dval" style="color:#16a34a">${p.saldo} kpl</span></div>`:''}
    <div class="modal-add-section">
      <div class="qty-row">
        <span class="qty-label">${tr.qtyLbl}</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="modalAdj(-1,'${p.cart_key}',${p.moq})">−</button>
          <input class="qty-val" id="modalQty" type="number" value="${inCart?cart[p.cart_key]:p.moq}" min="${p.moq}" step="${p.moq}">
          <button class="qty-btn" onclick="modalAdj(1,'${p.cart_key}',${p.moq})">+</button>
        </div>
      </div>
      <button class="modal-add-btn${isE?' erikois':''}${inCart?' remove':''}" onclick="modalToggle('${p.cart_key}',${p.moq})">
        ${inCart?tr.modalRemoveBtn:tr.modalAddBtn}
      </button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function modalAdj(dir,ck,moq){
  const el=document.getElementById('modalQty');
  let v=parseInt(el.value)||moq;
  v=Math.max(moq,v+dir*moq);
  el.value=v;
  if(cart[ck]>0){cart[ck]=v;updateCartBar();render();}
}
function modalToggle(ck,moq){
  if(cart[ck]>0){delete cart[ck];}
  else{const qty=parseInt(document.getElementById('modalQty').value)||moq;cart[ck]=Math.max(moq,qty);}
  updateCartBar();render();closeModalDirect();
}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}

// ── Search ──
function clearSearch(){document.getElementById('searchInput').value='';searchQ='';document.getElementById('clearBtn').classList.remove('show');render();}
let searchTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  searchQ=this.value.trim();
  document.getElementById('clearBtn').classList.toggle('show',!!searchQ);
  clearTimeout(searchTimer);searchTimer=setTimeout(render,150);
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModalDirect();closeCart();}});

// ── Cart modal ──
function openCart(){renderCart();document.getElementById('cartOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.body.style.overflow='';}

function renderCart(){
  const all=cartItems();
  const nk=all.filter(p=>p.source==='nikkarien');
  const ek=all.filter(p=>p.source==='erikois');
  const listEl=document.getElementById('cartList');
  
  if(!all.length){listEl.innerHTML='<div class="cart-empty">🛒 Kori on tyhjä</div>';document.getElementById('cartTotals').innerHTML='';return;}
  
  function itemHtml(p){
    const qty=cart[p.cart_key];
    const rowTot=p.hinta*qty;
    const isE=p.source==='erikois';
    const img=p.kuva?`<img class="cart-item-img${isE?' cart-item-erikois':''}" src="${p.kuva}" alt="">`:'<div class="cart-item-no-img">📦</div>';
    return`<div class="cart-item">
      ${img}
      <div class="cart-item-info">
        <div class="cart-item-nro${isE?' erikois':''}">${p.nro}${isE?' ⚡':''}</div>
        <div class="cart-item-name">${pName(p)}</div>
        <div class="cart-item-meta">MOQ ${p.moq} kpl · ${fmt(p.hinta)} €/kpl</div>
      </div>
      <div class="cart-item-right">
        <div class="cart-item-price">${fmt(rowTot)} €</div>
        <div class="cart-item-ctrl">
          <button class="cart-item-btn" onclick="cartAdj('${p.cart_key}',${p.moq},-1)">−</button>
          <input class="cart-item-qty" type="number" value="${qty}" min="${p.moq}" step="${p.moq}"
            onchange="cartSetQty('${p.cart_key}',${p.moq},this.value)">
          <button class="cart-item-btn" onclick="cartAdj('${p.cart_key}',${p.moq},1)">+</button>
        </div>
        <button class="cart-item-del" onclick="cartRemove('${p.cart_key}')">🗑</button>
      </div>
    </div>`;
  }
  
  let html='';
  if(nk.length){html+='<div class="cart-section-title">'+t().cartSecNk+'</div>'+nk.map(itemHtml).join('');}
  if(ek.length){html+='<div class="cart-section-title">'+t().cartSecEk+'</div>'+ek.map(itemHtml).join('');}
  listEl.innerHTML=html;
  
  const nkTotal=cartTotal(nk);
  const ekTotal=cartTotal(ek);
  const sub=nkTotal+ekTotal;
  const vat=sub*VAT;
  const tot=sub+vat;
  
  let totHtml='';
  if(nk.length&&ek.length){
    totHtml+=`<div class="total-row section"><span>${t().totalNk}</span><span>${fmt(nkTotal)} €</span></div>`;
    totHtml+=`<div class="total-row section"><span>${t().totalEk}</span><span>${fmt(ekTotal)} €</span></div>`;
  }
  totHtml+=`<div class="total-row"><span>${t().totalSub}</span><span>${fmt(sub)} €</span></div>`;
  totHtml+=`<div class="total-row"><span>${t().totalVat}</span><span>${fmt(vat)} €</span></div>`;
  totHtml+=`<div class="total-row big"><span>${t().totalGrand}</span><span>${fmt(tot)} €</span></div>`;
  document.getElementById('cartTotals').innerHTML=totHtml;
}
function cartAdj(ck,moq,dir){cart[ck]=Math.max(moq,(cart[ck]||moq)+dir*moq);updateCartBar();renderCart();render();}
function cartSetQty(ck,moq,val){let v=Math.max(moq,Math.round((parseInt(val)||moq)/moq)*moq);cart[ck]=v;updateCartBar();renderCart();render();}
function cartRemove(ck){delete cart[ck];updateCartBar();renderCart();render();}

// ── Print ──
function printOrder(){
  const all=cartItems();
  if(!all.length)return;
  
  // Validate customer field
  const customerInput=document.getElementById('customerName');
  const customerName=customerInput.value.trim();
  if(!customerName){
    const msg=LANG==='fi'
      ? '👤 Täytä asiakkaan nimi ennen tulostusta!'
      : '👤 Please enter a customer name before printing!';
    customerInput.focus();
    customerInput.style.borderColor='#dc2626';
    customerInput.style.boxShadow='0 0 0 3px rgba(220,38,38,0.18)';
    customerInput.placeholder=LANG==='fi'?'⚠️ Pakollinen kenttä!':'⚠️ Required field!';
    // Shake animation
    customerInput.animate([
      {transform:'translateX(0)'},{transform:'translateX(-6px)'},
      {transform:'translateX(6px)'},{transform:'translateX(-4px)'},
      {transform:'translateX(4px)'},{transform:'translateX(0)'}
    ],{duration:320,easing:'ease-in-out'});
    // Reset styling on input
    customerInput.addEventListener('input',function resetStyle(){
      customerInput.style.borderColor='';
      customerInput.style.boxShadow='';
      customerInput.placeholder=t().custPh;
      customerInput.removeEventListener('input',resetStyle);
    });
    alert(msg);
    return;
  }
  
  const nk=all.filter(p=>p.source==='nikkarien');
  const ek=all.filter(p=>p.source==='erikois');
  const now=new Date();
  const dateStr=now.toLocaleDateString('fi-FI',{day:'2-digit',month:'2-digit',year:'numeric'});
  const tr=t();
  
  function tableRows(items,startIdx){
    return items.map((p,i)=>{
      const qty=cart[p.cart_key];
      const rowTot=p.hinta*qty;
      const isE=p.source==='erikois';
      const imgCell=p.kuva?`<td class="pd-img-cell"><img class="pd-img" src="${p.kuva}"></td>`:'<td class="pd-img-cell">—</td>';
      return`<tr>
        <td style="width:18pt;color:#999;font-size:7pt;text-align:center">${startIdx+i+1}</td>
        ${imgCell}
        <td><div class="pd-nro">${p.nro}${isE?' ⚡':''}</div><div class="pd-name">${pName(p)}</div></td>
        <td class="right" style="white-space:nowrap">${fmt(p.hinta)} €</td>
        <td class="right" style="white-space:nowrap">${qty} kpl</td>

function t() { return T[LANG]; }
function pName(p) { return LANG==='en' ? (p.nimi_en||p.nimi_fi||p.nimi) : (p.nimi_fi||p.nimi); }

function setLang(lang) {
  LANG = lang;
  document.getElementById('btnFI').classList.toggle('active', lang==='fi');
  document.getElementById('btnEN').classList.toggle('active', lang==='en');
  document.getElementById('headerSub').textContent = t().headerSub;
  document.getElementById('searchInput').placeholder = t().searchPh;
  // Update lang bar label
  const lbl = document.querySelector('.lang-bar-label');
  if(lbl) lbl.textContent = lang==='fi' ? 'Kieli:' : 'Language:';
  // Update help button text
  const helpSpan = document.querySelector('.help-open-btn span');
  if(helpSpan) helpSpan.textContent = lang==='fi' ? 'Ohjeet' : 'Help';
  rebuildChips();
  render();
  updateCartBar();
  // If cart is open, re-render it
  if(document.getElementById('cartOverlay').classList.contains('open')) renderCart();
  // If help is open, re-render it
  if(document.getElementById('helpOverlay').classList.contains('open')) renderHelp();
}

function rebuildChips() {
  const el = document.getElementById('chips');
  el.innerHTML = '';
  const allC = document.createElement('div');
  allC.className = 'chip' + (activeGroup===null?' active':'');
  allC.textContent = t().allChip(P.length);
  allC.onclick = () => { activeGroup=null; document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); allC.classList.add('active'); render(); };
  el.appendChild(allC);
  
  const groupNames = {
    fi: {Kauha:'Kauha',Kiulu:'Kiulu',Setti:'Setti',Mittari:'Mittari',Tuoksu:'Tuoksu',
         Tekstiili:'Tekstiili',Harja:'Harja',Takka:'Takka',Muu:'Muu','Erikoiserä':'Erikoiserä'},
    en: {Kauha:'Ladle',Kiulu:'Bowl',Setti:'Set',Mittari:'Meter',Tuoksu:'Scent',
         Tekstiili:'Textile',Harja:'Brush',Takka:'Fireplace',Muu:'Other','Erikoiserä':'Special Offers'}
  };
  const gn = groupNames[LANG];
  
  allGroups.forEach(g => {
    const n = P.filter(p=>p.ryhma===g).length;
    if(!n) return;
    const c = document.createElement('div');
    const label = gn[g]||g;
    c.className = 'chip' + (activeGroup===g?' active':'') + (g==='Erikoiserä'?' erikois-chip':'');
    c.textContent = label+' ('+n+')';
    c.onclick = () => { activeGroup=g; document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); render(); };
    el.appendChild(c);
  });
}

<script>
(function(){

  if(el) el.textContent = AUTO_VERSION;
  var del = document.getElementById('dateSpan');
  if(del) del.textContent = AUTO_DATE;
  document.title = 'Hinnasto 2026 – Nikkarien Oy ' + AUTO_VERSION;
})();
</script>

<!-- ===== PWA: Service Worker -rekisteröinti ===== -->
<script>
(function(){
  if (!('serviceWorker' in navigator)) return;
  var proto = location.protocol;
  if (proto !== 'http:' && proto !== 'https:') return;
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('service-worker.js')
      .then(function(reg){ if (reg && reg.update) reg.update(); })
      .catch(function(err){ console.warn('SW-rekisteröinti epäonnistui:', err); });
  });
})();
</script>
